<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- 暗黑系仪表盘背景 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#05070a" />
    </linearGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- VS Code 风格圆角底板 -->
  <rect width="256" height="256" rx="52" fill="url(#bg)" />
  <!-- 轻微边框 -->
  <rect width="254" height="254" x="1" y="1" rx="51" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2" />

  <!-- 仪表盘轨道 -->
  <path d="M 64 180 A 76 76 0 1 1 192 180" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="16" stroke-linecap="round" />
  
  <!-- 仪表盘进度环 (发光质感) -->
  <path d="M 64 180 A 76 76 0 1 1 192 180" fill="none" stroke="url(#ring-grad)" stroke-width="16" stroke-linecap="round" stroke-dasharray="358" stroke-dashoffset="100" filter="url(#glow)" />

  <!-- 核心字母 M (代表 MiniMax) -->
  <path d="M 104 144 L 104 100 L 128 124 L 152 100 L 152 144" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />

  <!-- 正常状态绿点 -->
  <circle cx="128" cy="180" r="10" fill="#10b981" filter="url(#glow)" />
</svg>
