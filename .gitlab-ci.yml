image: node:20

stages:
  - verify
  - build
  - publish

variables:
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # 回传服务器配置
  DEPLOY_HOST: "192.168.19.107"
  DEPLOY_USER: "runner"
  DEPLOY_PATH: "/opt/builds/artifacts/$CI_PROJECT_NAME"
  DEPLOY_URL: "runner@192.168.19.107:/opt/builds/artifacts/$CI_PROJECT_NAME"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/
    - src-tauri/target/

.anchor_build: &anchor_build
  before_script:
    - npm ci
  script:
    - npm run tauri:build:ci
  artifacts:
    paths:
      - src-tauri/target/release/bundle/
    expire_in: 1 week

verify_extension:
  stage: verify
  script:
    - npm ci
    - npm run compile
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

build_linux:
  stage: build
  tags:
    - linux
    - tauri
  before_script:
    - apt-get update && apt-get install -y libdbus-1-dev libayatana-appindicator3-dev librsvg2-dev libgtk-3-dev libwebkit2gtk-4.1-dev patchelf pkg-config rpm
    - npm ci
  script:
    - npm run tauri:build:ci
    # 回传产物到部署服务器
    - |
      if command -v rsync &> /dev/null; then
        mkdir -p ~/.ssh
        echo "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null
        mkdir -p $DEPLOY_PATH/linux-$CI_COMMIT_SHORT_SHA
        rsync -avz --progress src-tauri/target/release/bundle/appimage/*.AppImage src-tauri/target/release/bundle/deb/*.deb src-tauri/target/release/bundle/rpm/*.rpm $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/linux-$CI_COMMIT_SHORT_SHA/
      fi
  artifacts:
    paths:
      - src-tauri/target/release/bundle/appimage/*.AppImage
      - src-tauri/target/release/bundle/deb/*.deb
      - src-tauri/target/release/bundle/rpm/*.rpm
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

build_windows:
  stage: build
  tags:
    - windows
    - tauri
  before_script:
    - npm ci
  script:
    - npm run tauri:build:ci
    # 回传产物到部署服务器 (Windows PowerShell)
    - |
      $sshDir = "$env:USERPROFILE\.ssh"
      New-Item -ItemType Directory -Force -Path $sshDir | Out-Null
      $env:DEPLOY_SSH_PRIVATE_KEY | Out-File -FilePath "$sshDir\id_ed25519" -NoNewline -Encoding ASCII
      icacls "$sshDir\id_ed25519" /inheritance:r /grant "${env:USERNAME}:(R,W)" 2>$null | Out-Null
      ssh-keyscan -H $env:DEPLOY_HOST 2>$null | Out-File -Append "$sshDir\known_hosts" -Encoding ASCII
      $remoteDir = "$env:DEPLOY_PATH\windows-$env:CI_COMMIT_SHORT_SHA"
      ssh "$env:DEPLOY_USER@$env:DEPLOY_HOST" "mkdir -p $remoteDir"
      scp -r src-tauri/target/release/bundle/nsis/*.exe "$env:DEPLOY_USER@$env:DEPLOY_HOST:$remoteDir\"
  artifacts:
    paths:
      - src-tauri/target/release/bundle/nsis/*.exe
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

build_macos:
  stage: build
  tags:
    - macos
    - tauri
  before_script:
    - npm ci
  script:
    - npm run tauri:build:ci
  artifacts:
    paths:
      - src-tauri/target/release/bundle/dmg/*.dmg
      - src-tauri/target/release/bundle/macos/*.app
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

publish_marketplace:
  stage: publish
  needs:
    - verify_extension
  script:
    - npm ci
    - npm run publish:marketplace
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$/'
