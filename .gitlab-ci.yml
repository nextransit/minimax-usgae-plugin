image: node:20

stages:
  - verify
  - publish

variables:
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

verify_extension:
  stage: verify
  script:
    - npm ci
    - npm test
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

publish_marketplace:
  stage: publish
  needs:
    - verify_extension
  script:
    - npm ci
    - npm run publish:marketplace
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$/'
