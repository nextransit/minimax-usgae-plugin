name: Release Desktop App

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # macOS ARM64
  build-macos-arm64:
    name: macOS (ARM64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: 'aarch64-apple-darwin' }
      - run: npm ci
      - run: npm run tauri:build:ci -- --target aarch64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: error

  # macOS x86_64
  build-macos-x64:
    name: macOS (x86_64)
    runs-on: macos-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: 'x86_64-apple-darwin' }
      - run: npm ci
      - run: npm run tauri:build:ci -- --target x86_64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: error

  # Linux x86_64
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libdbus-1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libgdk-pixbuf2.0-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            rpm

      - name: Configure Linux pkg-config
        run: |
          glib_pc="$(find /usr -name 'glib-2.0.pc' -print -quit)"
          if [ -z "$glib_pc" ]; then
            echo "glib-2.0.pc not found"
            exit 1
          fi
          pkg_config_path="$(dirname "$glib_pc"):/usr/lib/pkgconfig:/usr/share/pkgconfig"
          {
            echo "PKG_CONFIG_PATH=${pkg_config_path}"
            echo "PKG_CONFIG_ALLOW_SYSTEM_CFLAGS=1"
          } >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${pkg_config_path}"
          find /usr -name 'glib-2.0.pc' -print
          pkg-config --modversion glib-2.0
          pkg-config --modversion gtk+-3.0
          pkg-config --modversion webkit2gtk-4.1

      - run: npm ci
      - run: npm run tauri:build:ci

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

  # Windows x86_64
  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run tauri:build:ci
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  # 创建 GitHub Release 并上传所有平台的安装包
  release:
    name: Create GitHub Release
    needs: [build-macos-arm64, build-macos-x64, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts
        run: find artifacts -type f -ls

      - name: Write release notes
        run: |
          cat > release-notes.md << EOF
          ## MiniMax Usage Monitor ${GITHUB_REF_NAME}

          本发布包含 VS Code 插件的同源前端版本。同时提供桌面版安装包。

          ### VS Code 插件
          在 VS Code 扩展商店搜索 \`decard.minimax-usage-statusbar\` 安装。

          ### 桌面版下载

          | 平台 | 架构 | 格式 |
          |------|------|------|
          | macOS | ARM64 (Apple Silicon) | DMG |
          | macOS | x86_64 (Intel) | DMG |
          | Linux | x86_64 | AppImage / deb / rpm |
          | Windows | x86_64 | NSIS Installer |
          EOF

      - name: Create Release
        run: |
          gh release create ${{ github.ref_name }} artifacts/**/* \
            --title "MiniMax Usage Monitor ${{ github.ref_name }}" \
            --notes-file release-notes.md \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate update.json
        run: node scripts/generate-update-json.js

      - name: Upload update.json to Release
        run: gh release upload ${{ github.ref_name }} update.json --clobber
        env:
          GH_TOKEN: ${{ github.token }}
