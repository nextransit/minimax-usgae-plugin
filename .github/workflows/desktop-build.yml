name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - feature/standalone-app
    paths:
      - ".github/workflows/desktop-build.yml"
      - "package.json"
      - "package-lock.json"
      - "src-tauri/**"
      - "src-web/**"
  pull_request:
    paths:
      - ".github/workflows/desktop-build.yml"
      - "package.json"
      - "package-lock.json"
      - "src-tauri/**"
      - "src-web/**"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # 代码质量检查（所有平台共享）
  code-quality:
    name: Code Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            targets: ""
          - os: macos-latest
            targets: aarch64-apple-darwin,x86_64-apple-darwin
          - os: windows-latest
            targets: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}
          components: clippy,rustfmt

      - name: Install Linux desktop dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libdbus-1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libgdk-pixbuf2.0-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config

      - name: Configure Linux pkg-config
        if: matrix.os == 'ubuntu-24.04'
        run: |
          glib_pc="$(find /usr -name 'glib-2.0.pc' -print -quit)"
          if [ -z "$glib_pc" ]; then
            echo "glib-2.0.pc not found"
            exit 1
          fi
          pkg_config_path="$(dirname "$glib_pc"):/usr/lib/pkgconfig:/usr/share/pkgconfig"
          {
            echo "PKG_CONFIG_PATH=${pkg_config_path}"
            echo "PKG_CONFIG_ALLOW_SYSTEM_CFLAGS=1"
          } >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${pkg_config_path}"
          find /usr -name 'glib-2.0.pc' -print
          pkg-config --modversion glib-2.0
          pkg-config --modversion gtk+-3.0
          pkg-config --modversion webkit2gtk-4.1

      - name: Check formatting
        run: cargo fmt --check --manifest-path src-tauri/Cargo.toml

      - name: Clippy lints
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

  # macOS 多架构构建
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    needs: code-quality
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: arm64
            rust_targets: aarch64-apple-darwin
            target: aarch64-apple-darwin
          - os: macos-latest
            arch: x86_64
            rust_targets: x86_64-apple-darwin
            target: x86_64-apple-darwin
          - os: macos-latest
            arch: universal
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            target: universal-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app
        run: |
          if [ "${{ matrix.target }}" = "universal-apple-darwin" ]; then
            npm run tauri:build -- --target ${{ matrix.target }}
          else
            npm run tauri:build:ci -- --target ${{ matrix.target }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: minimax-monitor-macos-${{ matrix.arch }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/*/release/bundle/dmg/*.dmg
            src-tauri/target/*/release/bundle/macos/*.app
          if-no-files-found: error

  # Linux 多架构构建
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    needs: code-quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libdbus-1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libgdk-pixbuf2.0-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            rpm

      - name: Configure Linux pkg-config
        run: |
          glib_pc="$(find /usr -name 'glib-2.0.pc' -print -quit)"
          if [ -z "$glib_pc" ]; then
            echo "glib-2.0.pc not found"
            exit 1
          fi
          pkg_config_path="$(dirname "$glib_pc"):/usr/lib/pkgconfig:/usr/share/pkgconfig"
          {
            echo "PKG_CONFIG_PATH=${pkg_config_path}"
            echo "PKG_CONFIG_ALLOW_SYSTEM_CFLAGS=1"
          } >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${pkg_config_path}"
          find /usr -name 'glib-2.0.pc' -print
          pkg-config --modversion glib-2.0
          pkg-config --modversion gtk+-3.0
          pkg-config --modversion webkit2gtk-4.1

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri:build:ci

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: minimax-monitor-linux-${{ matrix.arch }}
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

  # Windows 构建
  build-windows:
    name: Build Windows
    needs: code-quality
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri:build:ci

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: minimax-monitor-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
