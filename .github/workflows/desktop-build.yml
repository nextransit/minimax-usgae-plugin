name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - feature/standalone-app
    paths:
      - ".github/workflows/desktop-build.yml"
      - "package.json"
      - "package-lock.json"
      - "src-tauri/**"
      - "src-web/**"
  pull_request:
    paths:
      - ".github/workflows/desktop-build.yml"
      - "package.json"
      - "package-lock.json"
      - "src-tauri/**"
      - "src-web/**"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            artifact_name: minimax-monitor-macos
            artifact_path: |
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/macos/*.app
          - name: Linux
            os: ubuntu-24.04
            artifact_name: minimax-monitor-linux
            artifact_path: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
          - name: Windows
            os: windows-latest
            artifact_name: minimax-monitor-windows
            artifact_path: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            rpm

      - name: Install Node dependencies
        run: npm ci

      - name: Compile VS Code extension
        run: npm run compile

      - name: Build Tauri desktop app
        run: npm run tauri:build:ci

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
