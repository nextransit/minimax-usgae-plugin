name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - feature/standalone-app
    paths:
      - ".github/workflows/desktop-build.yml"
      - "package.json"
      - "package-lock.json"
      - "src-tauri/**"
      - "src-web/**"
  pull_request:
    paths:
      - ".github/workflows/desktop-build.yml"
      - "package.json"
      - "package-lock.json"
      - "src-tauri/**"
      - "src-web/**"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # 代码质量检查（所有平台共享）
  code-quality:
    name: Code Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            targets: ""
          - os: macos-latest
            targets: aarch64-apple-darwin,x86_64-apple-darwin
          - os: windows-latest
            targets: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}
          components: clippy,rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy lints
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test --lib

  # macOS 多架构构建
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    needs: code-quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: arm64
            target: aarch64-apple-darwin
          - os: macos-latest
            arch: x86_64
            target: x86_64-apple-darwin
          - os: macos-latest
            arch: universal
            target: universal-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app
        run: |
          if [ "${{ matrix.target }}" = "universal-apple-darwin" ]; then
            npm run tauri:build -- --target ${{ matrix.target }}
          else
            npm run tauri:build:ci -- --target ${{ matrix.target }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: minimax-monitor-macos-${{ matrix.arch }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error

  # Linux 多架构构建
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    needs: code-quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x86_64
            target: ""
          - os: ubuntu-24.04
            arch: arm64
            target: "--target aarch64-unknown-linux-gnu"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch == 'arm64' && 'aarch64-unknown-linux-gnu' || '' }}

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            rpm \
            gcc-aarch64-linux-gnu \
            libc6-dev-arm64-cross

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri:build:ci ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: minimax-monitor-linux-${{ matrix.arch }}
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

  # Windows 构建
  build-windows:
    name: Build Windows
    needs: code-quality
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri:build:ci

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: minimax-monitor-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error