name: Publish VS Code Extension

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: '要发布的版本号，例如 0.0.9'
        required: true
        type: string

jobs:
  publish:
    name: Publish to VS Code Marketplace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish -p ${{ secrets.VSCE_PAT }}
        continue-on-error: true

      - name: Switch publisher to benpay for Open-VSX
        run: |
          cp package.json package.json.bak
          jq '.publisher = "benpay"' package.json > package.json.tmp && mv package.json.tmp package.json

      - name: Package for Open-VSX
        run: npx @vscode/vsce package -o minimax-openvsx.vsix

      - name: Publish to Open-VSX
        run: npx ovsx publish minimax-openvsx.vsix -p ${{ secrets.OVSX_PAT }} --skip-duplicate
        continue-on-error: true

      - name: Restore publisher
        run: mv package.json.bak package.json
